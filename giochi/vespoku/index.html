<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/giochi/cruciverba/LogoStoriePontederesi_cruciverba.png">
  <link rel="apple-touch-icon" href="/giochi/cruciverba/LogoStoriePontederesi_cruciverba.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vespoku — Sudoku di Storie Pontederesi</title>
  <meta name="description" content="Vespoku: il Sudoku giornaliero di Storie Pontederesi. Un nuovo puzzle ogni giorno, allegato alla newsletter Rotatorie.">
  <meta property="og:title" content="Vespoku — Sudoku di Storie Pontederesi">
  <meta property="og:description" content="Un nuovo Sudoku ogni giorno, dalla newsletter Rotatorie.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rosa:#f5d0c5;--rosso:#a40d26;--rosso2:#c41030;
      --teal:#5bbfad;--giallo:#f5c842;--testo:#4a2020;--bg:#fff4f0;
    }
    body{background:var(--rosa);font-family:'Inter',sans-serif;color:var(--testo);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:1.2rem 1rem 3rem;gap:0}
    header{text-align:center;margin-bottom:.8rem}
    h1{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,48px);
      color:var(--rosso);text-transform:uppercase;line-height:1.1}
    .ep{font-family:'Playfair Display',serif;font-size:13px;color:var(--rosso);opacity:.8;margin-top:.2rem}
    #msg{min-height:22px;font-weight:700;font-size:14px;color:var(--rosso);text-align:center;margin:.4rem 0}

    /* ── Griglia ── */
    #board{
      display:grid;grid-template-columns:repeat(9,1fr);
      border:3px solid var(--rosso);border-radius:4px;
      width:min(360px,95vw);margin:.5rem auto;
      background:var(--rosso);gap:1px;
    }
    .cell{
      background:var(--bg);width:100%;aspect-ratio:1;
      display:flex;align-items:center;justify-content:center;
      font-size:clamp(14px,4vw,22px);font-weight:700;cursor:pointer;
      color:var(--testo);position:relative;transition:background .1s;
      border:none;outline:none;
    }
    /* spessore bordo box 3x3 */
    .cell[data-c="2"],.cell[data-c="5"]{border-right:2px solid var(--rosso)}
    .cell[data-r="2"],.cell[data-r="5"]{border-bottom:2px solid var(--rosso)}

    .cell.given{color:var(--rosso);font-weight:800}
    .cell.selected{background:#fce8e2}
    .cell.same-num{background:#fde8b0}
    .cell.highlight{background:#fdf0ec}
    .cell.error{color:#c0392b}
    .cell.correct{color:var(--teal)}
    .cell.notes{font-size:clamp(6px,1.8vw,9px);font-weight:400;line-height:1.1;color:#999;
      display:grid;grid-template-columns:repeat(3,1fr);align-items:center;justify-items:center;
      padding:2px;}
    .cell.complete-flash{animation:flash .4s ease 3}
    @keyframes flash{0%,100%{background:var(--bg)}50%{background:var(--teal)}}

    /* ── Numpad ── */
    #numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
      width:min(360px,95vw);margin:.6rem auto}
    .num{
      padding:.5rem .2rem;border:2px solid var(--rosso);border-radius:10px;
      background:var(--bg);color:var(--rosso);font-family:'Playfair Display',serif;
      font-size:clamp(16px,5vw,24px);cursor:pointer;text-align:center;
      transition:background .15s,color .15s;user-select:none;
    }
    .num:hover,.num:active{background:var(--rosso);color:var(--bg)}
    .num.canc{font-size:13px;font-weight:700}

    /* ── Bottoni ── */
    .btn-row{display:flex;gap:8px;justify-content:center;margin:.5rem 0;flex-wrap:wrap}
    .btn{padding:.4rem .9rem;border:2px solid var(--rosso);border-radius:999px;
      background:transparent;color:var(--rosso);font-weight:700;font-size:12px;
      cursor:pointer;transition:background .15s,color .15s}
    .btn:hover{background:var(--rosso);color:var(--bg)}
    .btn.active{background:var(--rosso);color:var(--bg)}

    /* ── Win box ── */
    #win-box{display:none;background:var(--bg);border:2.5px solid var(--rosso);
      border-radius:16px;padding:1rem 1.4rem;max-width:340px;width:100%;
      text-align:center;margin:.6rem auto}
    #win-box h2{font-family:'Playfair Display',serif;color:var(--rosso);font-size:20px;margin-bottom:.5rem}
    #win-box p{font-size:13px;margin-bottom:.7rem}

    /* ── Footer ── */
    .social-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
      font-size:12px;font-weight:700;margin:.8rem 0}
    .social-row a{color:var(--rosso);text-decoration:none}
    .social-row a:hover{text-decoration:underline}
    .nav{font-size:12px;text-align:center;margin-bottom:.5rem}
    .nav a{color:var(--rosso);font-weight:700;text-decoration:none}
    .logo{width:44px;opacity:.9;margin-top:.4rem}
  </style>
  <script data-goatcounter="https://storiepontederesi.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<header>
  <h1>Vespoku</h1>
  <div class="ep" id="ep-label">#1 — Sudoku di Rotatorie</div>
</header>

<div id="msg"></div>
<div id="board"></div>

<div class="btn-row">
  <button class="btn" id="btn-notes" onclick="toggleNotes()">✏️ Note</button>
  <button class="btn" onclick="verificaSoluzione()">✅ Verifica</button>
  <button class="btn" onclick="resetPartita()">↺ Reset</button>
</div>

<div id="numpad"></div>

<div id="win-box">
  <h2>🎉 Bravo!</h2>
  <p>Hai completato il Vespoku #<span id="win-num"></span>!<br>Torna domani per il prossimo.</p>
  <a class="btn" href="https://storiepontederesi.substack.com/subscribe" target="_blank" style="display:inline-block;margin-top:.3rem">✉ Iscriviti gratis</a>
</div>

<div class="nav"><a href="../">← Tutti i giochi</a></div>
<div class="social-row">
  <a href="https://www.instagram.com/storiepontederesi" target="_blank">📸 @storiepontederesi</a>
  <a href="https://storiepontederesi.substack.com" target="_blank">✉ Newsletter</a>
</div>
<img src="../cruciverba/LogoStoriePontederesi_cruciverba.png" alt="Storie Pontederesi" class="logo">

<script>
// ── SEEDED RNG (mulberry32) ────────────────────────────────────────────────
function mkRng(seed){
  return ()=>{
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function rShuffle(arr,rng){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(rng()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── GENERATORE PUZZLE GIORNALIERO ─────────────────────────────────────────
// Base valida (ogni riga, colonna e box 3x3 contiene 1-9)
const BASE=[
  [1,2,3,4,5,6,7,8,9],[4,5,6,7,8,9,1,2,3],[7,8,9,1,2,3,4,5,6],
  [2,3,4,5,6,7,8,9,1],[5,6,7,8,9,1,2,3,4],[8,9,1,2,3,4,5,6,7],
  [3,4,5,6,7,8,9,1,2],[6,7,8,9,1,2,3,4,5],[9,1,2,3,4,5,6,7,8],
];

function generaPuzzle(seed){
  const rng=mkRng(seed);
  // permutazione cifre
  const digs=rShuffle([1,2,3,4,5,6,7,8,9],rng);
  // ordine righe (shuffle dentro ogni banda)
  const rOrd=[
    ...rShuffle([0,1,2],rng),...rShuffle([3,4,5],rng),...rShuffle([6,7,8],rng)
  ];
  // ordine colonne
  const cOrd=[
    ...rShuffle([0,1,2],rng),...rShuffle([3,4,5],rng),...rShuffle([6,7,8],rng)
  ];
  // shuffle bande e stack
  const bOrd=rShuffle([0,1,2],rng);
  const sOrd=rShuffle([0,1,2],rng);
  const fR=bOrd.flatMap(b=>rOrd.slice(b*3,b*3+3));
  const fC=sOrd.flatMap(s=>cOrd.slice(s*3,s*3+3));
  // griglia soluzione
  const sol=fR.map(r=>fC.map(c=>digs[BASE[r][c]-1]));
  // rimozione celle (~46 celle, ~35 clue)
  const pos=rShuffle(Array.from({length:81},(_,i)=>i),rng);
  const puzzle=sol.map(r=>[...r]);
  let rimossi=0;
  for(const p of pos){
    if(rimossi>=46) break;
    puzzle[Math.floor(p/9)][p%9]=0;
    rimossi++;
  }
  return {puzzle,sol};
}

// ── DATA / GIORNO ─────────────────────────────────────────────────────────
const START=new Date("2025-06-01T00:00:00");
function giornoN(){
  const oggi=new Date();
  const ms=Date.UTC(oggi.getFullYear(),oggi.getMonth(),oggi.getDate())
           -Date.UTC(START.getFullYear(),START.getMonth(),START.getDate());
  return Math.max(0,Math.floor(ms/86400000));
}
const GIORNO_N=giornoN();
const NUM_EP=GIORNO_N+1;
document.getElementById("ep-label").textContent=`#${NUM_EP} — Sudoku di Rotatorie`;

const {puzzle:PUZZLE_BASE,sol:SOLUZIONE}=generaPuzzle(GIORNO_N+1234);

// ── STATO ─────────────────────────────────────────────────────────────────
const LS_KEY=`vespoku_${GIORNO_N}`;
let griglia=[];       // 9x9 numeri (0=vuoto)
let noteGriglia=[];   // 9x9 Set di note
let given=[];         // 9x9 bool
let selR=-1,selC=-1;
let noteMode=false;
let risolto=false;

function inizia(){
  griglia=PUZZLE_BASE.map(r=>[...r]);
  noteGriglia=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  given=PUZZLE_BASE.map(r=>r.map(v=>v!==0));
  const saved=localStorage.getItem(LS_KEY);
  if(saved){
    try{
      const s=JSON.parse(saved);
      griglia=s.griglia;
      noteGriglia=s.note.map(r=>r.map(n=>new Set(n)));
      risolto=s.risolto||false;
    }catch(e){localStorage.removeItem(LS_KEY);}
  }
  renderBoard();
  if(risolto) mostraVittoria();
}

function salva(){
  localStorage.setItem(LS_KEY,JSON.stringify({
    griglia,
    note:noteGriglia.map(r=>r.map(s=>[...s])),
    risolto
  }));
}

// ── RENDERING ─────────────────────────────────────────────────────────────
function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const cell=document.createElement("div");
      cell.className="cell";
      cell.dataset.r=r; cell.dataset.c=c;
      if(given[r][c]) cell.classList.add("given");
      const v=griglia[r][c];
      const notes=noteGriglia[r][c];
      if(v!==0){
        cell.textContent=v;
        if(!given[r][c]){
          if(!isValido(r,c,v)) cell.classList.add("error");
          else if(v===SOLUZIONE[r][c]) cell.classList.add("correct");
        }
      } else if(notes.size>0){
        cell.classList.add("notes");
        for(let n=1;n<=9;n++){
          const s=document.createElement("span");
          s.textContent=notes.has(n)?n:"";
          cell.appendChild(s);
        }
      }
      if(r===selR&&c===selC) cell.classList.add("selected");
      else if(selR>=0&&selC>=0&&v!==0&&v===griglia[selR][selC]) cell.classList.add("same-num");
      else if(selR>=0&&selC>=0&&(r===selR||c===selC||
        (Math.floor(r/3)===Math.floor(selR/3)&&Math.floor(c/3)===Math.floor(selC/3))))
        cell.classList.add("highlight");
      cell.addEventListener("click",()=>seleziona(r,c));
      board.appendChild(cell);
    }
  }
}

function seleziona(r,c){
  selR=r; selC=c;
  renderBoard();
}

// ── VALIDAZIONE ────────────────────────────────────────────────────────────
function isValido(r,c,v){
  for(let i=0;i<9;i++){
    if(i!==c&&griglia[r][i]===v) return false;
    if(i!==r&&griglia[i][c]===v) return false;
  }
  const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
  for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++){
    const nr=br+dr,nc=bc+dc;
    if((nr!==r||nc!==c)&&griglia[nr][nc]===v) return false;
  }
  return true;
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function inputNum(n){
  if(risolto||selR<0||selC<0) return;
  if(given[selR][selC]) return;
  if(noteMode&&n>0){
    const s=noteGriglia[selR][selC];
    s.has(n)?s.delete(n):s.add(n);
  } else {
    griglia[selR][selC]=n;
    noteGriglia[selR][selC].clear();
    // rimuovi note in riga/col/box
    if(n>0){
      for(let i=0;i<9;i++){
        noteGriglia[selR][i].delete(n);
        noteGriglia[i][selC].delete(n);
      }
      const br=Math.floor(selR/3)*3,bc=Math.floor(selC/3)*3;
      for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++)
        noteGriglia[br+dr][bc+dc].delete(n);
    }
  }
  salva();
  renderBoard();
  // check auto-completamento
  if(n>0&&!noteMode) checkCompleto();
}

function toggleNotes(){
  noteMode=!noteMode;
  document.getElementById("btn-notes").classList.toggle("active",noteMode);
}

function verificaSoluzione(){
  let errori=0;
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(griglia[r][c]!==0&&griglia[r][c]!==SOLUZIONE[r][c]) errori++;
  }
  if(errori===0){
    const vuoti=griglia.flat().filter(v=>v===0).length;
    if(vuoti===0){
      risolto=true; salva(); mostraVittoria();
    } else {
      document.getElementById("msg").textContent=`Nessun errore! Ancora ${vuoti} celle vuote.`;
    }
  } else {
    document.getElementById("msg").textContent=`Ci sono ${errori} errori. Continua! 💪`;
  }
}

function checkCompleto(){
  const piena=griglia.flat().every(v=>v!==0);
  if(!piena) return;
  const corretta=griglia.every((row,r)=>row.every((v,c)=>v===SOLUZIONE[r][c]));
  if(corretta){ risolto=true; salva(); mostraVittoria(); }
}

function mostraVittoria(){
  document.getElementById("win-box").style.display="block";
  document.getElementById("win-num").textContent=NUM_EP;
  document.getElementById("msg").textContent="🎉 Puzzle completato!";
  // flash tutte le celle
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.add("complete-flash");
  });
}

function resetPartita(){
  if(!confirm("Vuoi resettare la partita?")) return;
  localStorage.removeItem(LS_KEY);
  risolto=false;
  selR=-1; selC=-1;
  document.getElementById("win-box").style.display="none";
  document.getElementById("msg").textContent="";
  inizia();
}

// ── NUMPAD ────────────────────────────────────────────────────────────────
function buildNumpad(){
  const np=document.getElementById("numpad");
  for(let n=1;n<=9;n++){
    const b=document.createElement("div");
    b.className="num"; b.textContent=n;
    b.addEventListener("click",()=>inputNum(n));
    np.appendChild(b);
  }
  const canc=document.createElement("div");
  canc.className="num canc"; canc.textContent="Canc";
  canc.addEventListener("click",()=>inputNum(0));
  np.appendChild(canc);
}

// ── TASTIERA FISICA ────────────────────────────────────────────────────────
document.addEventListener("keydown",e=>{
  if(e.ctrlKey||e.metaKey) return;
  if(e.key>="1"&&e.key<="9"){ inputNum(parseInt(e.key)); return; }
  if(e.key==="Backspace"||e.key==="Delete"||e.key==="0"){ inputNum(0); return; }
  if(selR<0||selC<0) return;
  const moves={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
  if(moves[e.key]){
    e.preventDefault();
    const [dr,dc]=moves[e.key];
    seleziona(Math.max(0,Math.min(8,selR+dr)),Math.max(0,Math.min(8,selC+dc)));
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────
buildNumpad();
inizia();
</script>
</body>
</html>
