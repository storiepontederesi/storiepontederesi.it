<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesple — Archivio parole</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#f2c9be;font-family:'Inter',sans-serif;color:#4a2020;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:2rem 1rem 3rem}
    h1{font-family:'Permanent Marker',cursive;font-size:clamp(28px,7vw,48px);
      color:#8b1a2f;text-transform:uppercase;text-align:center;margin-bottom:.3rem}
    .sub{font-family:'Permanent Marker',cursive;font-size:14px;color:#8b1a2f;
      opacity:.8;margin-bottom:2rem;text-align:center}
    table{width:100%;max-width:400px;border-collapse:collapse;margin-bottom:2rem}
    th{background:#8b1a2f;color:#f2c9be;font-size:13px;padding:.6rem .8rem;text-align:left}
    td{background:#fff4f0;border-bottom:1px solid #e5b8af;padding:.6rem .8rem;font-size:14px}
    td a{color:#8b1a2f;font-weight:700;text-decoration:none}
    td a:hover{text-decoration:underline}
    tr:last-child td{border-bottom:none}
    .btn-back{display:inline-block;margin-bottom:1.5rem;padding:.45rem 1.2rem;
      border:2px solid #8b1a2f;border-radius:999px;color:#8b1a2f;font-weight:700;
      font-size:13px;text-decoration:none;transition:background .15s,color .15s}
    .btn-back:hover{background:#8b1a2f;color:#f2c9be}
    .logo{width:52px;opacity:.9;margin-top:1rem}
  </style>
</head>
<body>
  <h1>Vesple</h1>
  <div class="sub">Archivio parole</div>
  <a class="btn-back" href="index.html">← Gioca l'episodio corrente</a>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Parola</th>
        <th>Rigioca</th>
      </tr>
    </thead>
    <tbody id="archivio-body">
      <!-- Aggiungere una riga per ogni episodio pubblicato -->
      <tr>
        <td>#1</td>
        <td>VESPA</td>
        <td><a href="index.html">Gioca ancora</a></td>
      </tr>
    </tbody>
  </table>
  <img src="../cruciverbapontederese/LogoStoriePontederesi_cruciverba.png" alt="Storie Pontederesi" class="logo">
</body>
</html>
